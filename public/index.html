<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LM Studio WAV Generator</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Local audio lab</p>
            <h1 id="app-title">LM Studio WAV Generator</h1>
          </div>
          <button id="refresh-models" class="secondary" type="button">Refresh</button>
        </div>

        <form id="generator-form" class="generator-form">
          <div class="field-row">
            <label class="field">
              <span>LM Studio URL</span>
              <input id="base-url" name="baseUrl" type="url" value="http://localhost:1234" autocomplete="off">
            </label>
            <label class="field">
              <span>Model</span>
              <select id="model" name="model">
                <option value="">Auto</option>
              </select>
            </label>
          </div>

          <label class="field prompt-field">
            <span>Prompt</span>
            <textarea id="prompt" name="prompt" rows="7">warm analog synth melody with soft rain percussion</textarea>
          </label>

          <div class="field-row compact">
            <label class="field">
              <span>Duration</span>
              <input id="duration" name="duration" type="range" min="3" max="30" step="1" value="12">
              <output id="duration-output" for="duration">12s</output>
            </label>
            <label class="field">
              <span>Temperature</span>
              <input id="temperature" name="temperature" type="range" min="0.1" max="1.4" step="0.1" value="0.8">
              <output id="temperature-output" for="temperature">0.8</output>
            </label>
          </div>

          <div class="actions">
            <button id="generate" class="primary" type="submit">Generate WAV</button>
            <a id="download" class="secondary hidden" download="lm-studio-audio.wav">Download WAV</a>
          </div>
        </form>
      </section>

      <aside class="output-panel" aria-live="polite">
        <div class="status-row">
          <div>
            <p class="eyebrow">Status</p>
            <p id="status" class="status-text">Idle</p>
          </div>
          <span id="connection-dot" class="dot" aria-hidden="true"></span>
        </div>

        <div id="result" class="result hidden">
          <h2 id="result-title">Generated audio</h2>
          <p id="result-description"></p>
          <audio id="audio" controls></audio>
        </div>

        <details class="plan-view">
          <summary>Sound plan</summary>
          <pre id="plan-json">{}</pre>
        </details>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
